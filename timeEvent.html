<!DOCTYPE html>
<html>
<script>
    let input = document.getElementById("input");

    let timer;
    input.addEventListener("input", () => {
        clearTimeout(timer);

        timer = setTimeout(() => {
            console.log("User stoped typing");
        }, 500);
    });
</script>

<body>
    <input type="text" id="input">
</body>

</html>
